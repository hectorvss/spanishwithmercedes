<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login â€” Spanish Lessons With Mercedes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">M</div>
      <div class="login-logo-text">
        <div class="login-logo-top">Spanish Lessons With</div>
        <div class="login-logo-bottom">Mercedes</div>
      </div>
    </div>
    <h1 class="login-title">Admin Access</h1>
    <p class="login-subtitle">Sign in to manage your content</p>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" placeholder="your@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required autocomplete="current-password">
        <div class="form-error" id="loginError">Incorrect email or password. Please try again.</div>
      </div>
      <button class="btn-login" type="submit">Sign In</button>
    </form>

    <div class="login-back">
      <a href="index.html">â† Back to website</a>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  if (localStorage.getItem('slwm_admin_auth') === 'true') {
    window.location.href = 'admin.html';
  }

  // Credentials (frontend-only â€” for real security use a backend)
  const ADMIN_EMAIL = 'admin@spanishlessonswithmercedes.com';
  const ADMIN_PASS  = 'SLWMercedes2025!';

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const pass  = document.getElementById('password').value;
    const errEl = document.getElementById('loginError');

    if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
      localStorage.setItem('slwm_admin_auth', 'true');
      window.location.href = 'admin.html';
    } else {
      errEl.classList.add('visible');
      document.getElementById('password').value = '';
    }
  }
</script>
</body>
</html>
